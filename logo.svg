<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <style>
      .line-main { stroke: #8a2318; stroke-width: 0.9; opacity: 0.85; }
      .line-cross { stroke: #6b1c13; stroke-width: 0.5; opacity: 0.5; stroke-dasharray: none; }
      .line-outer { stroke: #7a1f16; stroke-width: 0.6; opacity: 0.65; }
      .node-center { fill: #e74c3c; }
      .node-primary { fill: #c0392b; }
      .node-secondary { fill: #922b21; }
      .node-tertiary { fill: #7b241c; }
    </style>
  </defs>

  <!-- Cross connections between primary nodes (subtle) -->
  <line class="line-cross" x1="50" y1="17" x2="21" y2="63"/>
  <line class="line-cross" x1="50" y1="17" x2="79" y2="63"/>
  <line class="line-cross" x1="21" y1="63" x2="79" y2="63"/>

  <!-- Center to primaries -->
  <line class="line-main" x1="50" y1="50" x2="50" y2="17"/>
  <line class="line-main" x1="50" y1="50" x2="21" y2="63"/>
  <line class="line-main" x1="50" y1="50" x2="79" y2="63"/>

  <!-- Primary 1 (top) to its secondaries -->
  <line class="line-outer" x1="50" y1="17" x2="31" y2="5"/>
  <line class="line-outer" x1="50" y1="17" x2="69" y2="5"/>
  <line class="line-outer" x1="50" y1="17" x2="50" y2="3"/>

  <!-- Primary 2 (bottom-left) to its secondaries -->
  <line class="line-outer" x1="21" y1="63" x2="6" y2="50"/>
  <line class="line-outer" x1="21" y1="63" x2="7" y2="74"/>
  <line class="line-outer" x1="21" y1="63" x2="22" y2="84"/>

  <!-- Primary 3 (bottom-right) to its secondaries -->
  <line class="line-outer" x1="79" y1="63" x2="94" y2="50"/>
  <line class="line-outer" x1="79" y1="63" x2="93" y2="74"/>
  <line class="line-outer" x1="79" y1="63" x2="78" y2="84"/>

  <!-- A few cross-cluster secondary connections for density -->
  <line class="line-cross" x1="31" y1="5" x2="6" y2="50"/>
  <line class="line-cross" x1="69" y1="5" x2="94" y2="50"/>
  <line class="line-cross" x1="22" y1="84" x2="78" y2="84"/>

  <!-- Tertiary nodes (outermost) -->
  <line class="line-outer" x1="31" y1="5" x2="18" y2="0"/>
  <line class="line-outer" x1="69" y1="5" x2="82" y2="0"/>
  <line class="line-outer" x1="6" y1="50" x2="0" y2="38"/>
  <line class="line-outer" x1="7" y1="74" x2="0" y2="82"/>
  <line class="line-outer" x1="94" y1="50" x2="100" y2="38"/>
  <line class="line-outer" x1="93" y1="74" x2="100" y2="82"/>

  <!-- Tertiary nodes -->
  <circle class="node-tertiary" cx="18" cy="0" r="1.5"/>
  <circle class="node-tertiary" cx="82" cy="0" r="1.5"/>
  <circle class="node-tertiary" cx="0" cy="38" r="1.5"/>
  <circle class="node-tertiary" cx="0" cy="82" r="1.5"/>
  <circle class="node-tertiary" cx="100" cy="38" r="1.5"/>
  <circle class="node-tertiary" cx="100" cy="82" r="1.5"/>

  <!-- Secondary nodes -->
  <circle class="node-secondary" cx="31" cy="5" r="2.2"/>
  <circle class="node-secondary" cx="69" cy="5" r="2.2"/>
  <circle class="node-secondary" cx="50" cy="3" r="1.8"/>
  <circle class="node-secondary" cx="6" cy="50" r="2.2"/>
  <circle class="node-secondary" cx="7" cy="74" r="2.2"/>
  <circle class="node-secondary" cx="22" cy="84" r="1.8"/>
  <circle class="node-secondary" cx="94" cy="50" r="2.2"/>
  <circle class="node-secondary" cx="93" cy="74" r="2.2"/>
  <circle class="node-secondary" cx="78" cy="84" r="1.8"/>

  <!-- Primary nodes (3 movements) -->
  <circle class="node-primary" cx="50" cy="17" r="4"/>
  <circle class="node-primary" cx="21" cy="63" r="4"/>
  <circle class="node-primary" cx="79" cy="63" r="4"/>

  <!-- Center node -->
  <circle class="node-center" cx="50" cy="50" r="6.5"/>
</svg>
