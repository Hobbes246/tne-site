[[redirects]]
  from = "/"
  to = "/index.html"
  status = 200
[[redirects]]
  from = "/epic-fury"
  to = "/epic-fury.html"
  status = 200
[[redirects]]
  from = "/epic-fury/"
  to = "/epic-fury.html"
  status = 200
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
